blueprint:
  name: Smart Motion-activated Light
  description: Turn on a light when motion is detected, and only if the light is not already switched on.
  domain: automation
  author: Patrick Pellacani Mueller
  input:
    motion_entity:
      name: Motion Sensor
      selector:
        entity:
          filter:
            - device_class: occupancy
              domain: binary_sensor
            - device_class: motion
              domain: binary_sensor
    light_entities:
      name: Light
      selector:
        entity:
          multiple: true
          filter:
            - domain: light
    no_motion_wait:
      name: Wait time
      description: Time to leave the light on after last motion is detected.
      default:
        hours: 00
        minutes: 00
        seconds: 30
      selector:
        duration:

# If motion is detected within the delay,
# we restart the script.
mode: restart
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input motion_entity
    from: "off"
    to: "on"

actions:
  sequence:
    - repeat:
        for_each: !input light_entities
        sequence:
          - if:
            - condition: template
              value_template: "{{ is_state(repeat.item, 'off') }}"
            then:
            - action: light.turn_on
              target:
                entity_id: "{{ repeat.item }}"
            - wait_for_trigger:
              - trigger: state
                entity_id: !input motion_entity
                from: "on"
                to: "off"
            - delay:
              !input no_motion_wait
            - action: light.turn_off
              target:
                entity_id: "{{ repeat.item }}"
